packages:
  - packages/*
  - examples/*
  - benchmarks
  - docs
  - e2e
  - e2e/bundlers/*

overrides:
  yak-swc: workspace:*

# pnpm 11 enables a supply-chain "minimum release age" gate by default, which
# would block freshly published versions and churn an auto-generated exclude
# list on every update. This repo intentionally tracks the latest versions, so
# the gate is disabled (matching the prior pnpm 10 behaviour).
minimumReleaseAge: 0

# Native/postinstall build scripts that are allowed to run (pnpm 11 requires
# explicit approval).
allowBuilds:
  "@swc/core": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  wasm-pack: true

