name: Build and Deploy docs
env:
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "packages/yak-swc/**"
      - "packages/next-yak/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy docs site
    runs-on: ubuntu-latest
    env:
      IS_PRODUCTION: ${{ github.event_name == 'push' }}
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          ref: ${{ github.event.inputs.pr_number && format('refs/pull/{0}/head', github.event.inputs.pr_number) || github.ref }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.15.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install node_modules
        run: pnpm install

      - name: Add Rust wasm targets
        run: rustup target add wasm32-wasip1 wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Enable caching
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          workspaces: packages/yak-swc

      - name: Build with SWC
        run: pnpm run build:swc

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: vercel link --yes

      # Preview deployment (for pull requests, manual triggers, and non-main pushes)
      - name: Pull Vercel environment information (Preview)
        if: env.IS_PRODUCTION == 'false'
        run: vercel pull --yes --environment=preview

      - name: Build project artifacts (Preview)
        if: env.IS_PRODUCTION == 'false'
        run: vercel build

      - name: Deploy to Vercel (Preview)
        id: deploy-preview
        if: env.IS_PRODUCTION == 'false'
        run: |
          rm -rf .git # Remove the .git directory to avoid vercel to read the current author
          DEPLOYMENT_URL=$(vercel deploy --prebuilt)
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Preview deployment URL: $DEPLOYMENT_URL"

      # Production deployment (for main branch pushes)
      - name: Pull Vercel environment information (Production)
        if: env.IS_PRODUCTION == 'true'
        run: vercel pull --yes --environment=production

      - name: Build project artifacts (Production)
        if: env.IS_PRODUCTION == 'true'
        run: vercel build --prod

      - name: Deploy to Vercel (Production)
        if: env.IS_PRODUCTION == 'true'
        run: |
          rm -rf .git # Remove the .git directory to avoid vercel to read the current author
          vercel deploy --prebuilt --prod
