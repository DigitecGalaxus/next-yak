name: Deploy docs-vnext to GitHub Pages

env:
  NEXT_PUBLIC_BASE_PATH: /next-yak
  NEXT_PUBLIC_SITE_URL: https://digitecgalaxus.github.io/next-yak

on:
  push:
    branches:
      - main
      - docs/v2
    paths:
      - "docs-vnext/**"
      - "packages/yak-swc/**"
      - "packages/next-yak/**"
      - ".github/workflows/docs-vnext-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs-vnext
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.15.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install node_modules
        run: pnpm install

      - name: Add Rust wasm targets
        run: rustup target add wasm32-wasip1 wasm32-unknown-unknown

      - name: Enable caching
        uses: swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          workspaces: packages/yak-swc

      - name: Build SWC plugin
        run: pnpm run build:swc

      - name: Build next-yak
        run: pnpm run build

      - name: Build docs-vnext
        run: pnpm --filter docs-vnext build

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs-vnext/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
