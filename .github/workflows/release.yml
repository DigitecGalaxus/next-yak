name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets pushes the release PR / tags
      pull-requests: write # changesets opens the release PR
      id-token: write # npm publish with provenance
    env:
      COREPACK_ENABLE_STRICT: "0" # allow npm despite pnpm in `packageManager`
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - name: Add Rust wasm targets
        run: rustup target add wasm32-wasip1 wasm32-unknown-unknown

      - name: Enable caching
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/yak-swc

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3.4.3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Install npm with trusted-publishing support
        run: |
          corepack enable npm
          corepack prepare npm@11.11.0 --activate

      - name: Verify npm version
        run: npm --version

      # changesets/action runs `git push` directly, so it needs an authenticated remote.
      # Done explicitly here (rather than via checkout's persist-credentials) so the
      # credential is scoped to this step's needs and zizmor can audit the setup.
      - name: Configure git auth for changesets push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git config --local "http.https://github.com/.extraheader" "AUTHORIZATION: basic $auth"

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba # v1.5.3
        with:
          publish: pnpm release
          title: Release new version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
