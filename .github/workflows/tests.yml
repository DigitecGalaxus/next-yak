name: Vite-Tests

on:
  push:
    branches: ["main"]
    paths:
      - "./package.json"
      - "packages/next-yak/**"
      - "packages/yak-swc/**"
      - "packages/storybook-addon-yak/**"
      - "packages/eslint-plugin-yak/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "./package.json"
      - "packages/next-yak/**"
      - "packages/yak-swc/**"
      - "packages/storybook-addon-yak/**"
      - "packages/eslint-plugin-yak/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - name: Add Rust wasm targets
        run: rustup target add wasm32-wasip1 wasm32-unknown-unknown
      - name: Enable caching
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/yak-swc
      - name: Build with SWC
        run: pnpm run build:swc

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3.4.3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Build Storybook Addon
        run: pnpm run --filter=storybook-addon-yak build

      - name: Validate ESLint Plugin Docs
        run: pnpm --filter eslint-plugin-yak check:docs

      - name: Test
        run: pnpm run test

      - name: Build Storybook Example (Vite)
        run: pnpm --filter @example/storybook build-storybook:vite

      - name: Build Storybook Example (Webpack)
        run: pnpm --filter @example/storybook build-storybook:webpack
