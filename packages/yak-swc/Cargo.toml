[workspace]
members = ["css_in_js_parser", "yak_swc", "relative_posix_path", "../../docs/playground-wasm"]
resolver = "2"

[workspace.dependencies]
divan = "0.1.21"
insta = { version = "1.48.0", features = ["yaml"] }
itertools = "0.15.0"
lazy_static = "1.5.0"
pathdiff = "0.2.3"
percent-encoding = "2.3.2"
regex = "1.12.4"
rustc-hash = "2.1.2"
serde = "=1.0.228"
serde_json = "1.0.150"
serde_repr = "0.1"
swc_core = { version = "=71.0.3" }
swc_ecma_transforms_testing = "=48.0.0"
swc_ecma_parser = "=41.1.2"
swc_config = "=5.0.0"
testing = "24.0.1"
base64 = "0.22.1"

[profile.release]
# This profile results in small binary size with acceptable impact on
# performance, but there may well be further optimizations to be had.
strip = "debuginfo"
codegen-units = 1
lto = true
opt-level = "z"
